name: ChessAnalyser
options:
  bundleIdPrefix: com.logncomplexity.chessight
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"
  createIntermediateGroups: true
  defaultConfig: Debug

packages:
  FirebaseSDK:
    url: https://github.com/firebase/firebase-ios-sdk
    from: "11.0.0"

settings:
  base:
    SWIFT_VERSION: "5.9"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1,2"
    SWIFT_OBJC_BRIDGING_HEADER: "$(SRCROOT)/ChessAnalyser/Stockfish/include/ChessAnalyser-Bridging-Header.h"
    CLANG_CXX_LANGUAGE_STANDARD: "c++17"
    SWIFT_EMIT_LOC_STRINGS: true

schemes:
  ChessAnalyser:
    build:
      targets:
        ChessAnalyser: all
        ChessAnalyserShare: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - ChessAnalyserTests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release

targets:
  ChessAnalyser:
    type: application
    platform: iOS
    sources:
      - path: ChessAnalyser
        excludes:
          - "Stockfish/src/**"
          - "Stockfish/StockfishWrapper.cpp"
          - "Info.plist"
      - path: ChessAnalyser/Stockfish/src
        compilerFlags:
          - "-std=c++17"
          - "-DNDEBUG"
          - "-DUSE_PTHREADS"
          - "-O2"
          - "-w"
          - "-DNNUE_EMBEDDING_OFF"
        excludes:
          - "main.cpp.bak"
          - "Makefile"
          - "*.nnue"
          - "incbin/**"
      - path: ChessAnalyser/Stockfish/StockfishWrapper.cpp
        compilerFlags:
          - "-std=c++17"
          - "-DNDEBUG"
          - "-DUSE_PTHREADS"
          - "-O2"
          - "-w"
          - "-DNNUE_EMBEDDING_OFF"
    dependencies:
      - target: ChessAnalyserShare
        embed: true
      - package: FirebaseSDK
        product: FirebaseCrashlytics
      - package: FirebaseSDK
        product: FirebaseAnalytics
      - package: FirebaseSDK
        product: FirebasePerformance
    postBuildScripts:
      - script: |
          if [ "${DEBUG_INFORMATION_FORMAT}" != "dwarf-with-dsym" ]; then
            exit 0
          fi
          "${BUILD_DIR%/Build/*}/SourcePackages/checkouts/firebase-ios-sdk/Crashlytics/run" -gsp "${SRCROOT}/ChessAnalyser/GoogleService-Info.plist" -p ios
        name: Upload dSYM to Crashlytics
        inputFiles:
          - $(DWARF_DSYM_FOLDER_PATH)/$(DWARF_DSYM_FILE_NAME)
          - $(DWARF_DSYM_FOLDER_PATH)/$(DWARF_DSYM_FILE_NAME)/Contents/Resources/DWARF/$(PRODUCT_NAME)
          - $(DWARF_DSYM_FOLDER_PATH)/$(DWARF_DSYM_FILE_NAME)/Contents/Info.plist
          - $(TARGET_BUILD_DIR)/$(INFOPLIST_PATH)
          - $(SRCROOT)/ChessAnalyser/GoogleService-Info.plist
        basedOnDependencyAnalysis: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.logncomplexity.chessight
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        INFOPLIST_FILE: "$(SRCROOT)/ChessAnalyser/Info.plist"
        HEADER_SEARCH_PATHS:
          - "$(SRCROOT)/ChessAnalyser/Stockfish"
          - "$(SRCROOT)/ChessAnalyser/Stockfish/src"
        OTHER_LDFLAGS:
          - "$(inherited)"
          - "-ObjC"
        DEBUG_INFORMATION_FORMAT: "dwarf-with-dsym"

  ChessAnalyserShare:
    type: app-extension
    platform: iOS
    sources:
      - path: ChessAnalyserShare
        excludes:
          - "Info.plist"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.logncomplexity.chessight.share
        INFOPLIST_FILE: "$(SRCROOT)/ChessAnalyserShare/Info.plist"
        SWIFT_VERSION: "5.9"
        GENERATE_INFOPLIST_FILE: false
        TARGETED_DEVICE_FAMILY: "1,2"
        IPHONEOS_DEPLOYMENT_TARGET: "17.0"

  ChessAnalyserTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: ChessAnalyserTests
    settings:
      base:
        GENERATE_INFOPLIST_FILE: true
    dependencies:
      - target: ChessAnalyser
